name: HA Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ha-test:
    name: Home Assistant boot test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip (HA deps are large)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-ha-test-${{ hashFiles('requirements-ha-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-ha-test-

      - name: Install HA test dependencies
        run: pip install -r requirements-ha-test.txt

      - name: Run HA integration tests
        run: pytest ha_tests/ -v --tb=short
